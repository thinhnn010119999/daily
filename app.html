<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quản lý Ứng viên</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- BOOTSTRAP -->
  
<link rel="stylesheet"
 href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">


  <!-- CHART.JS -->
  

  <!-- SHEETJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    .dropdown-menu.show {
      display: block;
    }
  </style>

</head>

<body class="bg-light">

<div class="container py-4">

  <h3 class="text-center mb-4">Quản lý Ứng viên – Biểu đồ theo Sales</h3>

  <!-- CONFIG -->
  <div class="card mb-4">
    <div class="card-body">
      <h5>Cấu hình Dropdown</h5>

      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label">Danh sách Sales</label>
          <textarea id="editSales" class="form-control" rows="3"></textarea>
        </div>

        <div class="col-md-6">
          <label class="form-label">Danh sách Status</label>
          <textarea id="editStatus" class="form-control" rows="3"></textarea>
        </div>

        <div class="col-12">
          <button class="btn btn-success mt-2" onclick="updateDropdowns()">Cập nhật</button>
        </div>

      </div>
    </div>
  </div>

  <!-- COUNTERS -->
  <div id="statusCounters" class="row text-center mb-4"></div>

  <!-- SALES CHART -->
  <div class="card mb-4">
    <div class="card-body">
      <h5 class="text-center mb-3">Biểu đồ theo Sales</h5>
      <canvas id="salesChart" height="100"></canvas>
    </div>
  </div>

  <!-- ADD FORM -->
  <div class="card mb-4">
    <div class="card-body">
      <h5>Thêm ứng viên</h5>

      <div class="row g-3">

        <div class="col-md-3">
          <label class="form-label">Tên ứng viên</label>
          <input id="candidateName" class="form-control">
        </div>

        <div class="col-md-2">
          <label class="form-label">Kinh nghiệm</label>
          <input id="exp" type="number" class="form-control">
        </div>

        <div class="col-md-3">
          <label class="form-label">Sales</label>
          <div class="dropdown">
            <input id="salesSearch" class="form-control" placeholder="Tìm Sales...">
            <div id="salesMenu" class="dropdown-menu w-100" style="max-height:200px;overflow-y:auto;"></div>
          </div>
        </div>

        <div class="col-md-2">
          <label class="form-label">Vị trí</label>
          <input id="position" class="form-control">
        </div>

        <div class="col-md-2">
          <label class="form-label">Status</label>
          <select id="status" class="form-select"></select>
        </div>

        <div class="col-12">
          <button class="btn btn-primary mt-2" onclick="addCandidate()">Thêm</button>
        </div>

      </div>

    </div>
  </div>

  <!-- EXPORT -->
  <button class="btn btn-success mb-3" onclick="exportExcel()">Export Excel</button>

  <!-- TABLE -->
  <table class="table table-bordered table-striped">
    <thead class="table-dark">
      <tr>
        <th>STT</th>
        <th>Tên ứng viên</th>
        <th>Kinh nghiệm</th>
        <th>Sales</th>
        <th>Vị trí</th>
        <th>Status</th>
        <th>Ngày tạo</th>
        <th>Xóa</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

</div>

<script src="sw.js"></script>
</body>

</html>
