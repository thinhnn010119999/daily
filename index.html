<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ứng viên - CRUD + Dropdown + Export Excel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<!-- SheetJS (Export Excel) -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

</head>
<body class="bg-light">

<div class="container py-4">

  <h3 class="text-center mb-4">Quản lý Ứng viên (Full CRUD + Dropdown + Export Excel)</h3>

  <!-- Settings -->
  <div class="card mb-4">
    <div class="card-body">
      <h5>Chỉnh sửa Dropdown</h5>
      <div class="row">

        <div class="col-md-6">
          <label class="form-label">Danh sách Sales</label>
          <textarea id="editSales" class="form-control" rows="3"></textarea>
        </div>

        <div class="col-md-6">
          <label class="form-label">Danh sách Status</label>
          <textarea id="editStatus" class="form-control" rows="3"></textarea>
        </div>

        <div class="col-12 mt-2">
          <button class="btn btn-success" onclick="updateDropdowns()">Cập nhật Dropdown</button>
        </div>

      </div>
    </div>
  </div>

  <!-- Status Counter -->
  <div class="row text-center mb-4">
    <div class="col-md-4">
      <div class="p-3 bg-warning rounded">Pending: <b id="countPending">0</b></div>
    </div>
    <div class="col-md-4">
      <div class="p-3 bg-success text-white rounded">Approval: <b id="countApproval">0</b></div>
    </div>
    <div class="col-md-4">
      <div class="p-3 bg-danger text-white rounded">Reject: <b id="countReject">0</b></div>
    </div>
  </div>

  <!-- Form Add -->
  <div class="card mb-4">
    <div class="card-body">
      <h5>Thêm ứng viên mới</h5>

      <div class="row g-3">

        <div class="col-md-3">
          <label class="form-label">Tên ứng viên</label>
          <input id="candidateName" class="form-control">
        </div>

        <div class="col-md-2">
          <label class="form-label">Kinh nghiệm</label>
          <input id="exp" type="number" class="form-control">
        </div>

        <div class="col-md-3">
          <label class="form-label">Sales</label>
          <select id="sales" class="form-select"></select>
        </div>

        <div class="col-md-2">
          <label class="form-label">Vị trí</label>
          <input id="position" class="form-control">
        </div>

        <div class="col-md-2">
          <label class="form-label">Status</label>
          <select id="status" class="form-select"></select>
        </div>

        <div class="col-12">
          <button onclick="addCandidate()" class="btn btn-primary mt-2">Thêm</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Export Excel -->
  <button class="btn btn-success mb-3" onclick="exportExcel()">Export Excel</button>

  <!-- Table -->
  <table class="table table-bordered table-striped">
    <thead class="table-dark">
      <tr>
        <th>STT</th>
        <th>Tên ứng viên</th>
        <th>Kinh nghiệm</th>
        <th>Sales</th>
        <th>Vị trí</th>
        <th>Status</th>
        <th>Hành động</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

</div>

<script>

/* STORAGE */
let list = JSON.parse(localStorage.getItem("candidates") || "[]");
let salesList = JSON.parse(localStorage.getItem("salesList") || `["Sales A","Sales B","Sales C"]`);
let statusList = JSON.parse(localStorage.getItem("statusList") || `["pending","approval","reject"]`);

/* LOAD DROPDOWN */
function loadDropdowns() {
  let sales = document.getElementById("sales");
  let status = document.getElementById("status");

  sales.innerHTML = "";
  status.innerHTML = "";

  salesList.forEach(s => sales.innerHTML += `<option>${s}</option>`);
  statusList.forEach(s => status.innerHTML += `<option>${s}</option>`);

  document.getElementById("editSales").value = salesList.join("\n");
  document.getElementById("editStatus").value = statusList.join("\n");
}

/* UPDATE DROPDOWN */
function updateDropdowns() {
  salesList = document.getElementById("editSales").value.split("\n").map(x => x.trim()).filter(x => x);
  statusList = document.getElementById("editStatus").value.split("\n").map(x => x.trim()).filter(x => x);

  localStorage.setItem("salesList", JSON.stringify(salesList));
  localStorage.setItem("statusList", JSON.stringify(statusList));

  loadDropdowns();
}

/* RENDER TABLE */
function renderTable() {
  let tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  list.forEach((item, index) => {
    tbody.innerHTML += `
      <tr>
        <td>${index + 1}</td>
        <td>${item.name}</td>
        <td>${item.exp}</td>
        <td>${item.sales}</td>
        <td>${item.position}</td>
        <td>${item.status}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="deleteItem(${index})">Xóa</button>
        </td>
      </tr>`;
  });

  updateCounters();
}

/* COUNT STATUS */
function updateCounters() {
  document.getElementById("countPending").innerText =
    list.filter(x => x.status === "pending").length;

  document.getElementById("countApproval").innerText =
    list.filter(x => x.status === "approval").length;

  document.getElementById("countReject").innerText =
    list.filter(x => x.status === "reject").length;
}

/* ADD CANDIDATE */
function addCandidate() {
  list.push({
    name: document.getElementById("candidateName").value,
    exp: document.getElementById("exp").value,
    sales: document.getElementById("sales").value,
    position: document.getElementById("position").value,
    status: document.getElementById("status").value
  });

  localStorage.setItem("candidates", JSON.stringify(list));
  renderTable();

  candidateName.value = "";
  exp.value = "";
  position.value = "";
}

/* DELETE ITEM */
function deleteItem(i) {
  list.splice(i, 1);
  localStorage.setItem("candidates", JSON.stringify(list));
  renderTable();
}

/* EXPORT EXCEL */
function exportExcel() {
  let wb = XLSX.utils.book_new();
  let data = [
    ["STT", "Tên ứng viên", "Kinh nghiệm", "Sales", "Vị trí", "Status"]
  ];

  list.forEach((x, i) => {
    data.push([ i + 1, x.name, x.exp, x.sales, x.position, x.status ]);
  });

  let ws = XLSX.utils.aoa_to_sheet(data);
  XLSX.utils.book_append_sheet(wb, ws, "Danh sách");

  XLSX.writeFile(wb, "Ung_vien.xlsx");
}

/* INIT */
loadDropdowns();
renderTable();

</script>

</body>
</html>
