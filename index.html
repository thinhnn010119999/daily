<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CRUD + Status Counter + Editable Dropdown</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">
  <h3 class="text-center mb-4">Quản lý Ứng viên (CRUD + Stats + Editable Dropdown)</h3>

  <!-- Editable Dropdown Section -->
  <div class="card mb-4">
    <div class="card-body">
      <h5>Thiết lập Dropdown</h5>

      <div class="row">

        <div class="col-md-6">
          <label class="form-label">Danh sách Sales</label>
          <textarea id="editSales" class="form-control" rows="3"></textarea>
        </div>

        <div class="col-md-6">
          <label class="form-label">Danh sách Status</label>
          <textarea id="editStatus" class="form-control" rows="3"></textarea>
        </div>

        <div class="col-12 mt-2">
          <button class="btn btn-success" onclick="updateDropdowns()">Cập nhật Dropdown</button>
        </div>

      </div>
    </div>
  </div>

  <!-- Status Counter -->
  <div class="row text-center mb-4">
    <div class="col-md-4">
      <div class="p-3 bg-warning rounded">Pending: <b id="countPending">0</b></div>
    </div>
    <div class="col-md-4">
      <div class="p-3 bg-success text-white rounded">Approval: <b id="countApproval">0</b></div>
    </div>
    <div class="col-md-4">
      <div class="p-3 bg-danger text-white rounded">Reject: <b id="countReject">0</b></div>
    </div>
  </div>

  <!-- Add Form -->
  <div class="card mb-4">
    <div class="card-body">
      <h5>Thêm ứng viên</h5>
      <div class="row g-3">

        <div class="col-md-3">
          <label class="form-label">Tên ứng viên</label>
          <input id="name" class="form-control">
        </div>

        <div class="col-md-2">
          <label class="form-label">Kinh nghiệm</label>
          <input id="exp" type="number" class="form-control">
        </div>

        <div class="col-md-3">
          <label class="form-label">Sales</label>
          <select id="sales" class="form-select"></select>
        </div>

        <div class="col-md-2">
          <label class="form-label">Vị trí</label>
          <input id="position" class="form-control">
        </div>

        <div class="col-md-2">
          <label class="form-label">Status</label>
          <select id="status" class="form-select"></select>
        </div>

        <div class="col-12">
          <button onclick="addCandidate()" class="btn btn-primary mt-2">Thêm</button>
        </div>

      </div>
    </div>
  </div>

  <!-- Table -->
  <table class="table table-bordered table-striped">
    <thead class="table-dark">
      <tr>
        <th>STT</th>
        <th>Tên ứng viên</th>
        <th>Kinh nghiệm</th>
        <th>Sales</th>
        <th>Vị trí</th>
        <th>Status</th>
        <th>Hành động</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

</div>

<script>
/* ==================== STORAGE ==================== */
let list = JSON.parse(localStorage.getItem("candidates") || "[]");
let salesList = JSON.parse(localStorage.getItem("salesList") || `["Sales A","Sales B","Sales C"]`);
let statusList = JSON.parse(localStorage.getItem("statusList") || `["pending","approval","reject"]`);

/* ================== UPDATE DROPDown ================== */
function updateDropdowns() {
  salesList = document.getElementById("editSales").value.split("\n").map(x => x.trim()).filter(x => x);
  statusList = document.getElementById("editStatus").value.split("\n").map(x => x.trim()).filter(x => x);

  localStorage.setItem("salesList", JSON.stringify(salesList));
  localStorage.setItem("statusList", JSON.stringify(statusList));

  loadDropdowns();
}

/* ================== LOAD DROPDOWNS ================== */
function loadDropdowns() {
  let sales = document.getElementById("sales");
  let status = document.getElementById("status");

  sales.innerHTML = "";
  status.innerHTML = "";

  salesList.forEach(s => sales.innerHTML += `<option>${s}</option>`);
  statusList.forEach(s => status.innerHTML += `<option>${s}</option>`);

  document.getElementById("editSales").value = salesList.join("\n");
  document.getElementById("editStatus").value = statusList.join("\n");
}

/* ================== RENDER TABLE ================== */
function renderTable() {
  let tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  list.forEach((item, index) => {
    tbody.innerHTML += `
      <tr>
        <td>${index + 1}</td>
        <td>${item.name}</td>
        <td>${item.exp}</td>
        <td>${item.sales}</td>
        <td>${item.position}</td>
        <td>${item.status}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="deleteItem(${index})">Xóa</button>
        </td>
      </tr>`;
  });

  updateCounters();
}

/* ================== STATUS COUNTER ================== */
function updateCounters() {
  document.getElementById("countPending").innerText = list.filter(x => x.status === "pending").length;
  document.getElementById("countApproval").innerText = list.filter(x => x.status === "approval").length;
  document.getElementById("countReject").innerText = list.filter(x => x.status === "reject").length;
}

/* ================== ADD ITEM ================== */
function addCandidate() {
  list.push({
    name: name.value,
    exp: exp.value,
    sales: sales.value,
    position: position.value,
    status: status.value
  });

  localStorage.setItem("candidates", JSON.stringify(list));
  renderTable();

  name.value = "";
  exp.value = "";
  position.value = "";
}

/* ================== DELETE ITEM ================== */
function deleteItem(idx) {
  list.splice(idx, 1);
  localStorage.setItem("candidates", JSON.stringify(list));
  renderTable();
}

/* INIT */
loadDropdowns();
renderTable();
</script>

</body>
</html>
